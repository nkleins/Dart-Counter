<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#12151c"/>
  <!-- board base -->
  <circle cx="32" cy="32" r="24" fill="#1a202b" stroke="#f5b544" stroke-width="2"/>
  <!-- doubles ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#46d38a" stroke-width="4"/>
  <!-- inner field -->
  <circle cx="32" cy="32" r="16" fill="#12151c"/>
  <!-- triples ring -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#f2645f" stroke-width="4"/>
  <!-- radial wires (um 22.5° gedreht: oben zeigt ein Feld nach oben, kein Draht) -->
  <g stroke="#f5b544" stroke-width="1" opacity="0.5" transform="rotate(22.5 32 32)">
    <line x1="32" y1="8" x2="32" y2="56"/>
    <line x1="8" y1="32" x2="56" y2="32"/>
    <line x1="15" y1="15" x2="49" y2="49"/>
    <line x1="49" y1="15" x2="15" y2="49"/>
  </g>
  <!-- outer bull -->
  <circle cx="32" cy="32" r="7" fill="#46d38a"/>
  <!-- bull -->
  <circle cx="32" cy="32" r="3.5" fill="#f2645f"/>
</svg>
